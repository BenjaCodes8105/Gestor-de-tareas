<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas de Proyecto</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">

    <style>
        body {
            /* Cambio a degradado celeste/azul profesional */
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 30px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }
        /* Colores de prioridad */
        .prioridad-alta { color: #dc3545; font-weight: bold; }
        .prioridad-media { color: #fd7e14; font-weight: bold; }
        .prioridad-baja { color: #198754; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1>Gestor de Tareas de Proyecto</h1>

    <!-- Formulario -->
    <div class="row g-2 mb-4">
        <div class="col-md-7">
            <input type="text" id="tarea" class="form-control" placeholder="Nombre de la tarea">
        </div>
        <div class="col-md-3">
            <select id="prioridad" class="form-select">
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
            </select>
        </div>
        <div class="col-md-2">
            <button id="agregar" class="btn btn-primary w-100">Agregar</button>
        </div>
    </div>

    <!-- Tabla -->
    <table id="tablaTareas" class="table table-hover">
        <thead>
            <tr>
                <th>Tarea</th>
                <th>Prioridad</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <!-- Las tareas se agregan aquí dinámicamente -->
        </tbody>
    </table>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function() {
    // Inicialización de DataTable en español
    let tabla = $('#tablaTareas').DataTable({
        language: {
            url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
        }
    });

    // Evento para agregar tarea
    $('#agregar').click(function() {
        let tarea = $('#tarea').val();
        let prioridad = $('#prioridad').val();

        // Validación básica (No vacío)
        if (tarea.trim() === "") {
            alert("Por favor, ingrese el nombre de la tarea.");
            return;
        }

        // Asignación de clases según prioridad
        let clasePrioridad = "";
        if (prioridad === "Alta") clasePrioridad = "prioridad-alta";
        else if (prioridad === "Media") clasePrioridad = "prioridad-media";
        else clasePrioridad = "prioridad-baja";

        // Agregar fila a DataTable
        let nuevaFila = tabla.row.add([
            tarea,
            `<span class="${clasePrioridad}">${prioridad}</span>`,
            '<button class="btn btn-outline-danger btn-sm eliminar">Eliminar</button>'
        ]).draw().node();

        // Efecto visual de entrada
        $(nuevaFila).hide().fadeIn(600);

        // Limpiar formulario y dar foco
        $('#tarea').val('').focus();
    });

    // Evento para eliminar (Delegación de eventos)
    $('#tablaTareas').on('click', '.eliminar', function() {
        tabla.row($(this).parents('tr')).remove().draw();
    });
});
</script>

</body>
</html>
